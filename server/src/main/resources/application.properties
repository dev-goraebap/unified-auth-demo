spring.application.name=demo

# 로컬 전용 설정(DB 접속정보 등)은 커밋하지 않는다.
# application-local.properties (gitignore) 또는 환경변수로 주입한다. (ADR-0003)
spring.config.import=optional:application-local.properties

# --- JPA (명령/영속) : ADR-0002 ---
# 데모 초기에는 ddl-auto 로 스키마를 맞춘다. 스키마가 안정되면 Flyway 도입 검토. (ADR-0003)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- 본인인증 Provider : ADR-0004 ---
# mock = 데모용 결정적 DI 생성 / real = 실제 PASS 연동(계약 후)
auth.pass.provider=mock
# Mock 전용: DI/CI 합성 솔트와 본인인증 결과(reference) 유효기간.
# 데모라 기본값이 코드에 있으니 생략 가능. 아래는 명시적 예시.
auth.pass.mock.site-salt=demo-site-salt
auth.pass.mock.common-salt=demo-common-salt
auth.pass.mock.ttl=PT10M

# --- 세션 토큰(JWT Access + Refresh) : ADR-0006 ---
# jwt-secret은 데모 기본값이 코드에 있으나, 운영에서는 반드시 환경변수/로컬설정으로 덮어쓴다.
# access=15분(바디), refresh=14일(httpOnly 쿠키), refresh-cookie-secure는 https(운영)에서 true.
auth.token.access-ttl=PT15M
auth.token.refresh-ttl=P14D
auth.token.refresh-cookie=refresh_token
auth.token.refresh-cookie-secure=false

# --- 만료 데이터 청소 : ADR-0005/0006 ---
# 만료 verification·refresh_token 삭제 배치. 기본 매시 정각(코드 기본값). 필요 시 조정.
# auth.cleanup.cron=0 0 * * * *

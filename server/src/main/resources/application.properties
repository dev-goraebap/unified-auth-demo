spring.application.name=demo

# 로컬 전용 설정(DB 접속정보 등)은 커밋하지 않는다.
# application-local.properties (gitignore) 또는 환경변수로 주입한다. (ADR-0003)
spring.config.import=optional:application-local.properties

# --- JPA (명령/영속) : ADR-0002 ---
# 데모 초기에는 ddl-auto 로 스키마를 맞춘다. 스키마가 안정되면 Flyway 도입 검토. (ADR-0003)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- 본인인증 Provider : ADR-0004 ---
# mock = 데모용 결정적 DI 생성 / real = 실제 PASS 연동(계약 후)
auth.pass.provider=mock

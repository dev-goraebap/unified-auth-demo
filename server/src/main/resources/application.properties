spring.application.name=demo

# 로컬 전용 설정(DB 접속정보 등)은 커밋하지 않는다.
# application-local.properties (gitignore) 또는 환경변수로 주입한다. (ADR-0003)
spring.config.import=optional:application-local.properties

# --- JPA (명령/영속) : ADR-0002 ---
# 스키마는 Flyway 가 관리한다(아래 Flyway 섹션). JPA 는 DDL 을 건드리지 않고,
# 엔티티와 실제 스키마가 어긋나면 기동 시 실패하도록 validate 로만 검증한다. (ADR-0003)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- 스키마 마이그레이션 : Flyway (ADR-0003) ---
# 마이그레이션 스크립트: classpath:db/migration/V{n}__{설명}.sql
# baseline-on-migrate: 이미 ddl-auto 로 스키마가 존재하는 기존 DB 는 V1(베이스라인)을
#   재실행하지 않고 baseline 으로 표시만 한다. 빈 DB 는 V1 부터 정상 적용된다.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# --- 본인인증 Provider : ADR-0004 ---
# mock = 데모용 결정적 DI 생성 / real = 실제 PASS 연동(계약 후)
auth.pass.provider=mock
# Mock 전용: DI/CI 합성 솔트와 본인인증 결과(reference) 유효기간.
# 데모라 기본값이 코드에 있으니 생략 가능. 아래는 명시적 예시.
auth.pass.mock.site-salt=demo-site-salt
auth.pass.mock.common-salt=demo-common-salt
auth.pass.mock.ttl=PT10M

# --- 세션 토큰(JWT Access + Refresh) : ADR-0006 ---
# jwt-secret은 데모 기본값이 코드에 있으나, 운영에서는 반드시 환경변수/로컬설정으로 덮어쓴다.
# access=15분(바디), refresh=14일(httpOnly 쿠키), refresh-cookie-secure는 https(운영)에서 true.
auth.token.access-ttl=PT15M
auth.token.refresh-ttl=P14D
auth.token.refresh-cookie=refresh_token
auth.token.refresh-cookie-secure=false

# --- 만료 데이터 청소 : ADR-0005/0006 ---
# 만료 verification·refresh_token 삭제 배치. 기본 매시 정각(코드 기본값). 필요 시 조정.
# auth.cleanup.cron=0 0 * * * *

# --- 소셜 OAuth (카카오·구글) : 실제 연동 ---
# 엔드포인트·리다이렉트·스코프는 비밀이 아니라 커밋. client-id/secret은 application-local.properties(gitignore).
# 리다이렉트 URI는 각 콘솔에 등록된 값과 정확히 일치해야 한다(프론트 http://localhost:4200).
auth.oauth.kakao.authorize-uri=https://kauth.kakao.com/oauth/authorize
auth.oauth.kakao.token-uri=https://kauth.kakao.com/oauth/token
auth.oauth.kakao.userinfo-uri=https://kapi.kakao.com/v2/user/me
auth.oauth.kakao.redirect-uri=http://localhost:4200/auth/callback/kakao
auth.oauth.google.authorize-uri=https://accounts.google.com/o/oauth2/v2/auth
auth.oauth.google.token-uri=https://oauth2.googleapis.com/token
auth.oauth.google.userinfo-uri=https://openidconnect.googleapis.com/v1/userinfo
auth.oauth.google.redirect-uri=http://localhost:4200/auth/callback/google
auth.oauth.google.scope=openid email profile
